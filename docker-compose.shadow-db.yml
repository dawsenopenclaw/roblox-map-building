# ============================================================================
# Prisma shadow database with pgvector pre-installed.
#
# Why this exists: our migration 20260406000000_add_pgvector_rag runs
#   CREATE EXTENSION IF NOT EXISTS vector;
# which fails on a stock local Postgres (vanilla postgres:16 doesn't ship
# pgvector). Prisma's `migrate dev` spins up a shadow database on the same
# host as DATABASE_URL to diff the schema — and the shadow DB also runs the
# migration, so it also needs pgvector.
#
# This compose file runs `pgvector/pgvector:pg16` on port 5433 so it won't
# collide with your main Postgres on 5432. Then point SHADOW_DATABASE_URL at
# it in .env (or .env.local):
#
#   SHADOW_DATABASE_URL=postgresql://postgres:postgres@localhost:5433/shadow
#
# Usage:
#   npm run db:shadow           # start the shadow DB (docker compose up -d)
#   npx prisma migrate dev      # run migrations — Prisma will use the shadow
#   docker compose -f docker-compose.shadow-db.yml down   # stop it
#
# The data is ephemeral on purpose (no volume mount) — the shadow DB is
# reset by Prisma on every migrate, so persistence is pointless.
# ============================================================================

services:
  shadow-db:
    image: pgvector/pgvector:pg16
    container_name: forje-shadow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shadow
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shadow"]
      interval: 5s
      timeout: 3s
      retries: 10
